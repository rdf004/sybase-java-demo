# Log4j 1.x configuration
# Trade Ledger Service
#
# Author: Platform Engineering
# Date:   2012-03-14

log4j.rootLogger=INFO, console, file

# Console appender
log4j.appender.console=\
org.apache.log4j.ConsoleAppender
log4j.appender.console.layout=\
org.apache.log4j.PatternLayout
log4j.appender.console.layout\
.ConversionPattern=\
%d{yyyy-MM-dd HH:mm:ss} %-5p %c{1} - %m%n

# File appender
log4j.appender.file=\
org.apache.log4j.RollingFileAppender
log4j.appender.file.File=\
/var/log/trade-ledger/service.log
log4j.appender.file.MaxFileSize=10MB
log4j.appender.file.MaxBackupIndex=5
log4j.appender.file.layout=\
org.apache.log4j.PatternLayout
log4j.appender.file.layout\
.ConversionPattern=\
%d{yyyy-MM-dd HH:mm:ss} %-5p %c - %m%n

# Spring framework logging
log4j.logger.org.springframework=WARN
log4j.logger.org.springframework.jdbc=DEBUG

# Sybase jConnect logging
log4j.logger.com.sybase=WARN

# Application logging
log4j.logger.com.ubs.ledger=DEBUG
log4j.logger.com.ubs.ledger.dao=DEBUG

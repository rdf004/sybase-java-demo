# jdbc.properties
# Sybase ASE connection parameters
# for Trade Ledger Service.
#
# NOTE: This file is deployed to
# WEB-INF/ on the target server.
# Production values are managed by
# the ops team via Puppet.
#
# Contact: platform-eng@ubs-internal.net
# Last updated: 2013-01-22

jdbc.driver=com.sybase.jdbc4.jdbc.SybDriver
jdbc.url=\
jdbc:sybase:Tds:10.2.48.101:5000/ubs_ledger
jdbc.username=sa
jdbc.password=sybase_password

# DBCP pool settings
# (tuned after the connection leak
#  incident in Feb 2013, see FI-3890)
pool.initialSize=2
pool.maxActive=10
pool.maxIdle=5
pool.minIdle=1
pool.maxWait=10000
pool.validationQuery=SELECT 1
pool.testOnBorrow=true
pool.testWhileIdle=true

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Build
        run: >-
          mvn -B compile
          -DskipTests

      - name: Package
        run: >-
          mvn -B package
          -DskipTests

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: >-
            target/trade-ledger-service.jar

  test:
    runs-on: ubuntu-latest
    needs: build
    if: >-
      vars.DB_HOST != ''
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Integration tests
        env:
          DB_HOST: ${{ vars.DB_HOST }}
          DB_NAME: ${{ vars.DB_NAME }}
          DB_USERNAME: >-
            ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: >-
            ${{ secrets.DB_PASSWORD }}
        run: >-
          mvn -B verify

  docker:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: >-
          docker/setup-buildx-action@v3

      - name: Build Docker image
        run: >-
          docker build
          -t trade-ledger-service:latest .
